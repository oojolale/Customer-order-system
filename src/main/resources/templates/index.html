<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 客户下单系统'">项目需求提交 - 客户下单系统</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial,sans-serif' font-size='14' font-weight='700' fill='white'>下</text></svg>">
    <meta name="description" content="客户下单系统，快速提交您的开发需求">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- 顶部导航 -->
<header class="header">
    <div class="container">
        <div class="logo">
            <a href="/">
                <span class="logo-text">客户下单系统</span>
                <span class="logo-sub">需求提交平台</span>
            </a>
        </div>
        <nav class="nav">
            <a href="/" class="nav-link active">提交需求</a>
            <a href="/manage" class="nav-link">提交记录</a>
        </nav>
    </div>
</header>

<!-- 英雄区域 -->
<section class="hero">
    <div class="container">
        <h1 class="hero-title">客户下单</h1>
        <p class="hero-desc">请详细填写您的项目需求，我会尽快查看并与您沟通</p>
    </div>
</section>

<!-- 主内容 -->
<main class="main">
    <div class="container">

        <!-- 提示消息 -->
        <div th:if="${success}" class="alert alert-success">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span th:text="${error}"></span>
        </div>

        <!-- 表单卡片 -->
        <div class="form-card">
            <form action="/submit" method="post" enctype="multipart/form-data" id="submitForm" novalidate>

                <!-- ① 分类（多选） -->
                <div class="form-group">
                    <label class="form-label required">
                        <span class="label-num">01</span>
                        分类
                        <span class="label-tip">多选</span>
                    </label>
                    <div class="checkbox-group" id="categoryGroup">
                        <label class="checkbox-item">
                            <input type="checkbox" name="categories" value="网站">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                网站
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="categories" value="app">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                                App
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="categories" value="小程序">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12l2 2 4-4"/></svg>
                                小程序
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="categories" value="原生app">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><polyline points="12 18 12 18"/><line x1="9" y1="7" x2="15" y2="7"/></svg>
                                原生 App
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="categories" value="游戏">
                            <span class="checkbox-box"></span>
                            <span class="checkbox-text">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="12" rx="2"/><path d="M10 12H6m4 0v4m0-4V8m6 4h-2m2 0v2m0-2v-2"/></svg>
                                游戏
                            </span>
                        </label>
                    </div>
                    <span class="field-error" id="categoryError">请至少选择一项分类</span>
                </div>

                <!-- ② 产品类型（单选） -->
                <div class="form-group">
                    <label class="form-label required">
                        <span class="label-num">02</span>
                        产品
                        <span class="label-tip">单选</span>
                    </label>
                    <div class="radio-grid">
                        <label class="radio-card">
                            <input type="radio" name="productType" value="后台管理系统" required>
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                                <span>后台管理系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="公司业务系统">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                <span>公司业务系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="ai应用系统">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0 14a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/><path d="M4.93 4.93a2 2 0 1 1 2.83 2.83A2 2 0 0 1 4.93 4.93zm10.34 10.34a2 2 0 1 1 2.83 2.83 2 2 0 0 1-2.83-2.83z"/><path d="M2 12a2 2 0 1 1 4 0 2 2 0 0 1-4 0zm16 0a2 2 0 1 1 4 0 2 2 0 0 1-4 0z"/><path d="M4.93 19.07a2 2 0 1 1 2.83-2.83 2 2 0 0 1-2.83 2.83zm10.34-10.34a2 2 0 1 1 2.83-2.83 2 2 0 0 1-2.83 2.83z"/></svg>
                                <span>AI 应用系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="高并发电商系统">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                                <span>高并发电商系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="银行金融系统">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                <span>银行金融系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="消费者体验产品">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                <span>消费者体验产品</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="缺陷分析检测系统">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                <span>缺陷分析检测系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="手持式硬件设备物联系统">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                                <span>手持硬件物联系统</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="手机游戏">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="12" y1="8" x2="12" y2="14"/></svg>
                                <span>手机游戏</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="vr游戏">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                                <span>VR 游戏</span>
                            </span>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="productType" value="电脑游戏">
                            <span class="radio-inner">
                                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                <span>电脑游戏</span>
                            </span>
                        </label>
                    </div>
                    <span class="field-error" id="productError">请选择产品类型</span>
                </div>

                <!-- ③ 计划书（可选勾选） -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="label-num">03</span>
                        计划书
                        <span class="label-optional">可选</span>
                    </label>
                    <div class="toggle-item">
                        <label class="toggle-label">
                            <input type="checkbox" name="needPlan" value="1" id="needPlanCheck">
                            <span class="toggle-switch"></span>
                            <span class="toggle-text">需要提供开发计划书</span>
                        </label>
                        <p class="toggle-desc">包含：相应开发计划、设计稿、视效 UI，待确认定稿、执行、验收、后续二次开发、售后</p>
                    </div>
                </div>

                <!-- ④ 项目规模（单选） -->
                <div class="form-group">
                    <label class="form-label required">
                        <span class="label-num">04</span>
                        项目规模
                        <span class="label-tip">单选</span>
                    </label>
                    <div class="scale-group" id="scaleGroup">
                        <label class="scale-item" th:each="scale : ${ {'大工程','企业生产','私营','国家机构','事业单位','私人个体','消费者客户市场','其它'} }">
                            <input type="radio" name="projectScale" th:value="${scale}" required>
                            <span class="scale-box" th:text="${scale}"></span>
                        </label>
                    </div>
                    <span class="field-error" id="scaleError">请选择项目规模</span>
                </div>

                <!-- ⑤ 项目资料（可选） -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="label-num">05</span>
                        项目资料
                        <span class="label-optional">可选</span>
                    </label>
                    <textarea
                        name="projectInfo"
                        class="form-textarea"
                        rows="4"
                        placeholder="项目有哪些特色/研发与执行困难（如先进技术、复杂业务流程/工艺；需电路设计、消费者产品体验不满意等）"></textarea>

                    <!-- 文件上传区域 -->
                    <div class="upload-area" id="uploadArea">
                        <input type="file" name="files" id="fileInput" multiple
                               accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar,.jpg,.jpeg,.png,.gif,.mp4,.txt,.md"
                               style="display:none">
                        <div class="upload-inner" onclick="document.getElementById('fileInput').click()">
                            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" class="upload-icon">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <p class="upload-title">点击上传说明材料</p>
                            <p class="upload-hint">可提供说明材料文件或上传项目已经有的资料文件（有的话可传）</p>
                            <p class="upload-types">支持 PDF、Word、Excel、PPT、图片、压缩包等，单文件最大 50MB</p>
                        </div>
                        <div id="fileList" class="file-list"></div>
                    </div>
                </div>

                <!-- ⑥ 留言服务（必填） -->
                <div class="form-group">
                    <label class="form-label required" for="message">
                        <span class="label-num">06</span>
                        留言服务
                    </label>
                    <textarea
                        name="message"
                        id="message"
                        class="form-textarea"
                        rows="6"
                        required
                        placeholder="请填写项目功能描述、简介或者研究范围……&#10;&#10;例如：本项目是一个面向企业内部使用的任务管理系统，主要功能包括任务创建、分配、进度追踪、报表统计……"></textarea>
                    <span class="field-error" id="messageError">请填写留言服务内容</span>
                </div>

                <!-- ⑦ 客户邮箱（必填，用于发送确认邮件） -->
                <div class="form-group">
                    <label class="form-label required" for="clientEmail">
                        <span class="label-num">07</span>
                        您的邮箱
                    </label>
                    <input
                        type="email"
                        name="clientEmail"
                        id="clientEmail"
                        class="form-input"
                        required
                        placeholder="填写邮箱，提交成功后可收到确认通知邮件">
                    <span class="field-error" id="emailError">请填写有效的邮箱地址</span>
                </div>

                <!-- ⑧ 提示 -->
                <div class="form-notice">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>提交表单后我会尽快查看并回复您，请耐心等待。</span>
                </div>

                <!-- 提交按钮 -->
                <div class="form-actions">
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <span class="btn-text">提交需求</span>
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>

            </form>
        </div>

    </div>
</main>

<!-- 页脚 -->
<footer class="footer">
    <div class="container">
        <p>&copy; 2024 客户下单系统 · 需求提交平台</p>
    </div>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
