<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 客户下单系统'">提交记录 - 客户下单系统</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial,sans-serif' font-size='14' font-weight='700' fill='white'>下</text></svg>">
    <meta name="description" content="客户下单系统 提交记录">
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- 顶部导航 -->
<header class="header">
    <div class="container">
        <div class="logo">
            <a href="/">
                <span class="logo-text">客户下单系统</span>
                <span class="logo-sub">需求提交平台</span>
            </a>
        </div>
        <nav class="nav">
            <a href="/" class="nav-link">提交需求</a>
            <a href="/manage" class="nav-link active">提交记录</a>
        </nav>
    </div>
</header>

<!-- 英雄区域 -->
<section class="hero hero-sm">
    <div class="container">
        <div class="hero-header">
            <div>
                <h1 class="hero-title">提交记录</h1>
                <p class="hero-desc">共收到 <strong th:text="${total}">0</strong> 条需求记录</p>
            </div>
            <a href="/export" class="btn-export">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                导出 Excel
            </a>
        </div>
    </div>
</section>

<main class="main">
    <div class="container">

        <!-- 无数据 -->
        <div th:if="${pageData.records.isEmpty()}" class="empty-state">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
            <p>暂无提交记录</p>
            <a href="/" class="btn-submit" style="display:inline-flex;margin-top:1.5rem;">去提交需求</a>
        </div>

        <!-- 记录列表 -->
        <div th:if="${!pageData.records.isEmpty()}" class="record-list">
            <div th:each="item,stat : ${pageData.records}" class="record-card">
                <div class="record-header">
                    <div class="record-id">
                        <span class="id-label">#</span>
                        <span th:text="${item.id}">1</span>
                    </div>
                    <div class="record-meta">
                        <span th:class="'status-badge status-' + ${item.status}"
                              th:text="${item.status == 0 ? '待处理' : (item.status == 1 ? '已查看' : '已回复')}">待处理</span>
                        <time th:text="${#temporals.format(item.createTime, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</time>
                    </div>
                </div>

                <div class="record-body">
                    <!-- 分类标签 -->
                    <div class="record-row">
                        <span class="row-label">分类</span>
                        <div class="tag-list">
                            <span th:each="cat : ${item.category.split(',')}"
                                  class="tag tag-blue" th:text="${cat}"></span>
                        </div>
                    </div>

                    <!-- 产品类型 -->
                    <div class="record-row">
                        <span class="row-label">产品</span>
                        <span class="row-value" th:text="${item.productType}">后台管理系统</span>
                    </div>

                    <!-- 项目规模 -->
                    <div class="record-row">
                        <span class="row-label">规模</span>
                        <span class="row-value tag tag-gray" th:text="${item.projectScale}">企业生产</span>
                    </div>

                    <!-- 计划书 -->
                    <div class="record-row">
                        <span class="row-label">计划书</span>
                        <span th:class="${item.needPlan == 1 ? 'tag tag-green' : 'tag tag-gray'}"
                              th:text="${item.needPlan == 1 ? '需要' : '不需要'}">不需要</span>
                    </div>

                    <!-- 留言预览 -->
                    <div class="record-row" th:if="${item.message != null and !item.message.isEmpty()}">
                        <span class="row-label">留言</span>
                        <span class="row-value row-ellipsis" th:text="${item.message}"></span>
                    </div>

                    <!-- 项目资料预览 -->
                    <div class="record-row" th:if="${item.projectInfo != null and !item.projectInfo.isEmpty()}">
                        <span class="row-label">资料</span>
                        <span class="row-value row-ellipsis" th:text="${item.projectInfo}"></span>
                    </div>

                    <!-- 附件 -->
                    <div class="record-row" th:if="${item.attachments != null and !item.attachments.isEmpty()}">
                        <span class="row-label">附件</span>
                        <span class="tag tag-orange">
                            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:3px"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                            含附件
                        </span>
                    </div>
                </div>

                <div class="record-footer">
                    <a th:href="@{/detail/{id}(id=${item.id})}" class="btn-detail">
                        查看详情
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- 分页 -->
        <div th:if="${totalPages > 1}" class="pagination">
            <a th:if="${currentPage > 1}"
               th:href="@{/manage(page=${currentPage - 1})}"
               class="page-btn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                上一页
            </a>

            <span th:each="i : ${#numbers.sequence(1, totalPages)}"
                  th:class="${i == currentPage ? 'page-num active' : 'page-num'}">
                <a th:if="${i != currentPage}" th:href="@{/manage(page=${i})}" th:text="${i}"></a>
                <span th:if="${i == currentPage}" th:text="${i}"></span>
            </span>

            <a th:if="${currentPage < totalPages}"
               th:href="@{/manage(page=${currentPage + 1})}"
               class="page-btn">
                下一页
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6" transform="rotate(180 12 12)"/></svg>
            </a>
        </div>

    </div>
</main>

<footer class="footer">
    <div class="container">
        <p>&copy; 2024 客户下单系统 · 需求提交平台</p>
    </div>
</footer>

</body>
</html>
