<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目需求提交确认</title>
    <style>
        body {
            font-family: 'Noto Sans SC', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .email-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }
        .email-header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 32px 24px;
            border-radius: 16px 16px 0 0;
            text-align: center;
        }
        .email-header h1 {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .email-header p {
            margin: 0;
            opacity: 0.85;
            font-size: 14px;
        }
        .email-body {
            background-color: #ffffff;
            padding: 28px 32px;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .greeting {
            font-size: 15px;
            color: #374151;
            margin-bottom: 20px;
        }
        .greeting strong {
            color: #111827;
        }
        .success-banner {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-left: 4px solid #2563eb;
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 24px;
        }
        .success-banner .title {
            font-size: 15px;
            font-weight: 600;
            color: #1e40af;
            margin-bottom: 4px;
        }
        .success-banner .desc {
            font-size: 13px;
            color: #3b82f6;
        }
        .info-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .info-card-title {
            background: #f9fafb;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e5e7eb;
        }
        .info-row {
            display: flex;
            padding: 12px 16px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 14px;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            width: 110px;
            color: #6b7280;
            flex-shrink: 0;
        }
        .info-value {
            color: #111827;
            font-weight: 500;
            flex: 1;
            word-break: break-all;
        }
        .info-value.highlight {
            color: #2563eb;
        }
        .message-box {
            background: #f9fafb;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 14px;
            color: #374151;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .notice {
            background: #fefce8;
            border: 1px solid #fde68a;
            border-left: 4px solid #eab308;
            border-radius: 8px;
            padding: 14px 18px;
            margin-top: 24px;
        }
        .notice-title {
            font-size: 13px;
            font-weight: 600;
            color: #854d0e;
            margin-bottom: 6px;
        }
        .notice-desc {
            font-size: 13px;
            color: #a16207;
            line-height: 1.6;
        }
        .email-footer {
            text-align: center;
            padding: 20px 32px;
            color: #9ca3af;
            font-size: 12px;
            border-top: 1px solid #f3f4f6;
            margin-top: 8px;
        }
        .email-footer a {
            color: #2563eb;
            text-decoration: none;
        }
        @media only screen and (max-width: 480px) {
            .email-body { padding: 20px 16px; }
            .info-row { flex-direction: column; gap: 4px; }
            .info-label { width: auto; }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <!-- 头部 -->
        <div class="email-header">
            <h1>✅ 项目需求已收到</h1>
            <p>PCNX 项目需求平台 · 自动邮件通知</p>
        </div>

        <!-- 主体 -->
        <div class="email-body">
            <div class="greeting">
                <strong>尊敬的用户</strong>，您好！<br>
                您的项目需求已成功提交，我们已收到您的请求。
            </div>

            <!-- 成功提示 -->
            <div class="success-banner">
                <div class="title">📋 提交成功 · 需求编号 #<span th:text="${formId}"></span></div>
                <div class="desc">提交时间：<span th:text="${submitTime}"></span></div>
            </div>

            <!-- 需求信息卡片 -->
            <div class="info-card">
                <div class="info-card-title">📌 需求信息</div>
                <div class="info-row">
                    <span class="info-label">项目分类</span>
                    <span class="info-value highlight" th:text="${categories}">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">产品类型</span>
                    <span class="info-value" th:text="${productType}">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">项目规模</span>
                    <span class="info-value" th:text="${projectScale}">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">计划书需求</span>
                    <span class="info-value" th:text="${needPlan}">-</span>
                </div>
            </div>

            <!-- 项目描述 -->
            <div class="info-card">
                <div class="info-card-title">💬 项目功能描述 / 研究范围</div>
                <div class="info-row" style="display: block;">
                    <div class="message-box" th:text="${message}">-</div>
                </div>
            </div>

            <!-- 注意事项 -->
            <div class="notice">
                <div class="notice-title">⏳ 后续流程说明</div>
                <div class="notice-desc">
                    我们会尽快查看您的需求并回复您，请耐心等待。<br>
                    如有紧急情况，可联系平台管理员。
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="email-footer">
            <p>此邮件由 <strong>PCNX 项目需求平台</strong> 自动发送，请勿直接回复。</p>
            <p>© 2024 PCNX · 项目需求平台 &nbsp;|&nbsp; <a href="/">访问网站</a></p>
        </div>
    </div>
</body>
</html>
